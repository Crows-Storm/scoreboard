syntax = "proto3";

option go_package = "github.com/Crows-Storm/scoreboard/internal/common/genproto/userpb";

service UserService {

  // Get user by id
  rpc GetUser(GetUserRequest) returns (GetUserResponse);

}

message GetUserRequest {
  string id = 1;  // user id
}

message GetUserResponse {
  User user = 1;
}

message User {
  string id = 1;
  string email = 2;
  string name = 3;
  string avatar = 4;
  int32 balance = 5;  // init default 0, this value can < 0
  int64 created_at = 6;  // timestamp
  int64 updated_at = 7;  // timestamp
}
